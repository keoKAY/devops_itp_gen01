appName:
  app: nginx-stag
replicas: 1
container:
  name: nginx-cont
  image: nginx:latest
  port: 80
  env: 
    - name: POSTGRES_USER
      value: postgres_user  
    - name: POSTGRES_DB
      value: stagging-db
    - name: POSTGRES_PASSWORD
      value: stagging@password
resources:
  limits:
    memory: "128Mi"
    cpu: "500m"